<!-- Page Title -->
<h2>My Orders</h2>

<!-- Filters -->
<div class="filters">

  <input
    type="text"
    placeholder="Search Order ID"
    [(ngModel)]="searchOrderId">

  <button (click)="searchOrder()">
    Search
  </button>

  <select
    [(ngModel)]="selectedStatus"
    (change)="onStatusChange()">

    <option value="">
      All Statuses
    </option>

    <option value="pending">
      Pending
    </option>

    <option value="processing">
      Processing
    </option>

    <option value="shipped">
      Shipped
    </option>

    <option value="delivered">
      Delivered
    </option>

    <option value="cancelled">
      Cancelled
    </option>

  </select>

</div>

<!-- Export CSV -->
<button (click)="exportCsv()">
  📄 Export CSV
</button>

<br />
<br />

<!-- Loading -->
<p *ngIf="isLoading">
  Loading orders...
</p>

<!-- Empty State -->
<div *ngIf="!isLoading && orders.length === 0">
  <p>No orders found.</p>
</div>

<!-- Orders Table -->
<table *ngIf="!isLoading && orders.length > 0">

  <thead>
    <tr>
      <th>ID</th>
      <th>Total</th>
      <th>Status</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let order of orders">

      <td>
        #{{ order.order_id }}
      </td>

      <td>
        ₹ {{ order.total_price }}
      </td>

      <td>
        <span class="badge" [ngClass]="order.status">
          {{ order.status }}
        </span>
      </td>

      <td>
        {{ order.created_at | date:'medium' }}
      </td>

      <td>
        <button (click)="viewOrder(order)">
          View
        </button>
      </td>

    </tr>

  </tbody>

</table>

<br />
<br />

<!-- Pagination -->
<div
  class="pagination"
  *ngIf="!isLoading && orders.length > 0">

  <button
    (click)="firstPage()"
    [disabled]="currentPage === 1">
    First
  </button>

  <button
    (click)="prevPage()"
    [disabled]="!hasPrev">
    Previous
  </button>

  <span class="page-info">
    Page {{ currentPage }} of {{ totalPages }}
  </span>

  <button
    (click)="nextPage()"
    [disabled]="!hasNext">
    Next
  </button>

  <button
    (click)="lastPage()"
    [disabled]="currentPage === totalPages">
    Last
  </button>

</div>
