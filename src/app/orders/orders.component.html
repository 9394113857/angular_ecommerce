<!-- Page Title -->
<h2>My Orders</h2>

<!-- Export Orders as CSV -->
<button (click)="exportCsv()">
  📄 Export CSV
</button>

<br />
<br />

<!-- Loading State -->
<p *ngIf="isLoading">
  Loading orders...
</p>

<!-- Empty State -->
<div *ngIf="!isLoading && orders.length === 0">
  <p>No orders found.</p>
</div>

<!-- Orders Table -->
<table *ngIf="!isLoading && orders.length > 0">
  <thead>
    <tr>
      <!-- Table Headers -->
      <th>ID</th>
      <th>Total</th>
      <th>Status</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <!-- Loop through all orders -->
    <tr *ngFor="let order of orders">

      <!-- Order ID -->
      <td>
        #{{ order.order_id }}
      </td>

      <!-- Total Price -->
      <td>
        ₹ {{ order.total_price }}
      </td>

      <!-- Order Status -->
      <td>
        <span
          class="badge"
          [ngClass]="order.status"
        >
          {{ order.status }}
        </span>
      </td>

      <!-- Order Creation Date -->
      <td>
        {{ order.created_at | date:'medium' }}
      </td>

      <!-- View Order Details -->
      <td>
        <!-- Navigate to Order Details Page -->
        <button (click)="viewOrder(order)">
          View
        </button>
      </td>

    </tr>
  </tbody>
</table>
