<div class="profile-container">

  <!-- ===================================== -->
  <!-- PROFILE SECTION -->
  <!-- ===================================== -->

  <div class="profile-card">

    <h2>
      My Profile
    </h2>

    <form
      #profileForm="ngForm"
      (ngSubmit)="updateProfile(profileForm)"
    >

      <!-- FIRST NAME -->

      <label>
        First Name
      </label>

      <input
        type="text"
        name="first_name"
        [(ngModel)]="profile.first_name"
      />


      <!-- LAST NAME -->

      <label>
        Last Name
      </label>

      <input
        type="text"
        name="last_name"
        [(ngModel)]="profile.last_name"
      />


      <!-- PHONE -->

      <label>
        Phone Number
      </label>

      <input
        type="text"
        name="phone_number"
        [(ngModel)]="profile.phone_number"
      />


      <!-- EMAIL -->

      <label>
        Email
      </label>

      <input
        type="email"
        [value]="profile.email"
        disabled
      />


      <!-- MESSAGE -->

      <p class="message">
        {{ message }}
      </p>


      <!-- BUTTON -->

      <button
        type="submit"
      >

        {{
          loading
            ? 'Updating...'
            : 'Update Profile'
        }}

      </button>

    </form>

  </div>


  <!-- ===================================== -->
  <!-- PASSWORD SECTION -->
  <!-- ===================================== -->

  <div class="profile-card">

    <h2>
      Change Password
    </h2>

    <form
      #passwordForm="ngForm"
      (ngSubmit)="changePassword(passwordForm)"
    >

      <!-- OLD PASSWORD -->

      <label>
        Current Password
      </label>

      <input
        type="password"
        name="old_password"
        ngModel
        required
      />


      <!-- NEW PASSWORD -->

      <label>
        New Password
      </label>

      <input
        type="password"
        name="new_password"
        ngModel
        required
        minlength="5"
      />


      <!-- BUTTON -->

      <button
        type="submit"
      >

        Change Password

      </button>

    </form>

  </div>

</div>
