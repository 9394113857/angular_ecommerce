<div class="registerForm">

<h1>Profile</h1>

<form #profileForm="ngForm" (ngSubmit)="updateProfile(profileForm)">

<label>First Name</label>
<input type="text" name="first_name" [(ngModel)]="profile.first_name">

<label>Last Name</label>
<input type="text" name="last_name" [(ngModel)]="profile.last_name">

<label>Phone</label>
<input type="text" name="phone_number" [(ngModel)]="profile.phone_number">

<button type="submit">Update Profile</button>

</form>

<hr>

<h2>Change Password</h2>

<form #passwordForm="ngForm" (ngSubmit)="changePassword(passwordForm)">

<label>Old Password</label>
<input type="password" name="old_password" ngModel required>

<label>New Password</label>
<input type="password" name="new_password" ngModel required>

<button type="submit">Change Password</button>

</form>

<p>{{ message }}</p>

</div>
