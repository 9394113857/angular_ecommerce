<div class="registerForm">

  <h1>Forgot Password</h1>

  <form #form="ngForm" (ngSubmit)="submit(form)">

    <label>Email</label>
    <input
      type="email"
      name="email"
      ngModel
      required
      placeholder="Enter your email"
    />

    <button type="submit" [disabled]="form.invalid">
      {{ isLoading ? "Sending..." : "Send Reset Link" }}
    </button>

  </form>

  <p>{{ message }}</p>

</div>
