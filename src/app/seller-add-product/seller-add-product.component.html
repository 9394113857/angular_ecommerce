<!-- ===================================================== -->
<!-- 🟦 LOADING COMPONENT -->
<!-- ===================================================== -->
<app-loading [isLoading]="isLoading"></app-loading>

<!-- ===================================================== -->
<!-- 🟩 FORM -->
<!-- ===================================================== -->
<div class="container" *ngIf="!isLoading">

  <h2>Add Product</h2>

  <form #f="ngForm" (ngSubmit)="submit(f.value)">

    <!-- ========================= -->
    <!-- 🟦 Product Name -->
    <!-- ========================= -->
    <input 
      name="name" 
      ngModel 
      placeholder="Product Name" 
      required 
    />

    <!-- ========================= -->
    <!-- 🟩 Price -->
    <!-- ========================= -->
    <input 
      name="price" 
      ngModel 
      type="number" 
      placeholder="Price" 
      required 
      min="0" 
    />

    <!-- ========================= -->
    <!-- 🟨 Category -->
    <!-- ========================= -->
    <input 
      name="category" 
      ngModel 
      placeholder="Category" 
    />

    <!-- ========================= -->
    <!-- 🟥 Image URL -->
    <!-- ========================= -->
    <input 
      name="image" 
      ngModel 
      placeholder="Image URL (https://...)" 
    />

    <!-- ========================= -->
    <!-- 🟪 Description -->
    <!-- ========================= -->
    <textarea 
      name="description" 
      ngModel 
      placeholder="Description">
    </textarea>

    <!-- ========================= -->
    <!-- 🚀 SUBMIT BUTTON -->
    <!-- ========================= -->
    <button type="submit">
      Next → Add Stock
    </button>

  </form>

</div>
