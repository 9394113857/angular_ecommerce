<app-loading [isLoading]="isLoading"></app-loading>

<div class="container" *ngIf="!isLoading">

  <h2>Add Product</h2>

  <form #f="ngForm" (ngSubmit)="submit(f.value)">

    <!-- Product Name (Required) -->
    <input name="name" ngModel placeholder="Product Name" required />

    <!-- Price (Required, Positive Number) -->
    <input name="price" ngModel type="number" placeholder="Price" required min="0" />

    <!-- Category (Optional) -->
    <input name="category" ngModel placeholder="Category" />

    <!-- Image URL (Optional) -->
    <input name="image" ngModel placeholder="Image URL" />

    <!-- Description (Optional) -->
    <textarea name="description" ngModel placeholder="Description"></textarea>

    <button type="submit">Next → Add Stock</button>

  </form>

</div>
