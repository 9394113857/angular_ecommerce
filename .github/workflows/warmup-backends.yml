name: Warm Up All Backends

on:
workflow_dispatch:

jobs:
warmup:
runs-on: ubuntu-latest

```
steps:
  - name: Warm and Monitor Services
    run: |
      echo "========================================"
      echo "🚀 BACKEND STATUS DASHBOARD"
      echo "🕒 $(date)"
      echo "========================================"

      FAILED=0

      check_service() {
        NAME="$1"
        URL="$2"

        echo ""
        echo "🔴 [$NAME] OFFLINE / SLEEPING"
        sleep 1

        echo "🟡 [$NAME] WAKING UP..."
        sleep 1

        ATTEMPTS=0
        MAX_ATTEMPTS=10

        until curl --silent --fail --max-time 30 "$URL" > /dev/null
        do
          ATTEMPTS=$((ATTEMPTS + 1))

          echo "🟡 [$NAME] Attempt $ATTEMPTS/$MAX_ATTEMPTS..."

          if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
            echo "🔴 [$NAME] FAILED TO WAKE"
            FAILED=1
            return
          fi

          sleep 15
        done

        echo "🟢 [$NAME] UP AND RUNNING"
        echo "✅ [$NAME] HEALTH CHECK PASSED"
      }

      check_service "Auth Service" "https://backend-auth-service-ks6f.onrender.com"
      check_service "Product Service" "https://backend-product-service-ncl2.onrender.com"
      check_service "Cart/Order Service" "https://backend-cart-order-service-q6qh.onrender.com"
      check_service "ML Events Service" "https://backend-ml-events-service-ba9v.onrender.com"
      check_service "ML Recommendation Service" "https://backend-ml-recommendation-service-huu6.onrender.com"

      echo ""
      echo "========================================"
      echo "📊 FINAL SYSTEM STATUS"
      echo "========================================"
      echo ""

      if [ $FAILED -eq 0 ]; then
        echo "🟢 Auth Service"
        echo "🟢 Product Service"
        echo "🟢 Cart/Order Service"
        echo "🟢 ML Events Service"
        echo "🟢 ML Recommendation Service"
        echo ""
        echo "========================================"
        echo "🟢 ALL SYSTEMS UP AND RUNNING"
        echo "🚀 PLATFORM HEALTHY"
        echo "🕒 $(date)"
        echo "========================================"
      else
        echo "========================================"
        echo "🔴 ONE OR MORE SERVICES FAILED"
        echo "⚠️ CHECK LOGS ABOVE"
        echo "========================================"
        exit 1
      fi
