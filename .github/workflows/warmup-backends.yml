name: Warm Up All Backends (Manual Only + Clear Logs)

on:
  # 🔥 Manual trigger only
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest

    steps:

      - name: Warm Auth Service
        run: |
          echo "🚀 Warming Auth Service..."
          curl --fail -s https://backend-auth-service-ks6f.onrender.com \
            && echo "✅ Auth Service warmed successfully" \
            || echo "⚠️ Auth Service failed or already awake"

      - name: Warm Product Service
        run: |
          echo "🚀 Warming Product Service..."
          curl --fail -s https://backend-product-service-ncl2.onrender.com \
            && echo "✅ Product Service warmed successfully" \
            || echo "⚠️ Product Service failed or already awake"

      - name: Warm Cart/Order Service
        run: |
          echo "🚀 Warming Cart/Order Service..."
          curl --fail -s https://backend-cart-order-service-q6qh.onrender.com \
            && echo "✅ Cart/Order Service warmed successfully" \
            || echo "⚠️ Cart/Order Service failed or already awake"

      - name: Warm ML Events Service
        run: |
          echo "🚀 Warming ML Events Service..."
          curl --fail -s https://backend-ml-events-service-ba9v.onrender.com \
            && echo "✅ ML Events Service warmed successfully" \
            || echo "⚠️ ML Events Service failed or already awake"

      - name: Warm ML Recommendation Service
        run: |
          echo "🚀 Warming ML Recommendation Service..."
          curl --fail -s https://backend-ml-recommendation-service-huu6.onrender.com \
            && echo "✅ ML Recommendation Service warmed successfully" \
            || echo "⚠️ ML Recommendation Service failed or already awake"

      - name: Final Status
        run: |
          echo "======================================="
          echo "🔥 All backend services warmed (or checked) successfully"
          echo "======================================="
