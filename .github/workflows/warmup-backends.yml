name: Warm Up All Backends (Scheduled + Manual)

on:
  # 🔥 Manual trigger (Run workflow button in GitHub)
  workflow_dispatch:

  # ⏰ Auto schedule (every 10 minutes)
  schedule:
    - cron: "*/5 * * * *"

jobs:
  warmup:
    runs-on: ubuntu-latest

    steps:

      - name: Warm Auth Service
        run: |
          curl --fail -s https://backend-auth-service-ks6f.onrender.com || true

      - name: Warm Product Service
        run: |
          curl --fail -s https://backend-product-service-ncl2.onrender.com || true

      - name: Warm Cart/Order Service
        run: |
          curl --fail -s https://backend-cart-order-service-q6qh.onrender.com || true

      - name: Warm ML Events Service
        run: |
          curl --fail -s https://backend-ml-events-service-ba9v.onrender.com || true

      - name: Warm ML Recommendation Service
        run: |
          curl --fail -s https://backend-ml-recommendation-service-huu6.onrender.com || true

      - name: Final Status
        run: echo "🔥 All backend services warmed successfully"
